projects:
- name: mosslilley-agents-workshop-naive
  environments:
  - name: production
    databases:
    - name: mosslilley-naive-agent-db
      plan: basic-256mb
      region: oregon
      postgresMajorVersion: '18'
    services:
    - type: web
      name: mosslilley-naive-agent
      runtime: python
      region: oregon
      plan: starter
      buildCommand: pip install uv && uv sync --frozen --no-dev --package workshop-naive-agent
      startCommand: uv run python -m naive_agent.server
      healthCheckPath: /healthz
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mosslilley-naive-agent-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: '3.12'
